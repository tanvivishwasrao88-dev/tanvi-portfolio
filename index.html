<!DOCTYPE html>
<html>
<head>
<title>Tanvi Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

header{
padding:50px;
}

h1{
font-size:40px;
}

#typing{
font-size:20px;
color:#ffd700;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
background:white;
color:black;
padding:25px;
width:280px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

footer{
margin-top:40px;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>Tanvi Vishwasrao</h1>
<p id="typing"></p>

</header>

<div class="container">

<div class="card">
<h2>About Me</h2>
<p>Cloud Computing graduate passionate about cloud and data center technologies.</p>
</div>

<div class="card">
<h2>Skills</h2>
<p>Cloud Computing</p>
<p>Networking</p>
<p>Hardware Troubleshooting</p>
</div>

<div class="card">
<h2>Projects</h2>
<p>CI/CD Portfolio Website</p>
</div>

</div>

<footer>
<p>© 2026 Tanvi</p>
</footer>

<script>

const text = "Cloud Computing Graduate ☁️ | DevOps Learner";
let index = 0;

function type(){
 if(index < text.length){
  document.getElementById("typing").innerHTML += text.charAt(index);
  index++;
  setTimeout(type,80);
 }
}

type();

</script>

</body>
</html>
